<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checklist Companion Settings</title>
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="content" class="powerup-shell">
    <section class="surface stack-md settings-flat-shell">
      <header class="stack-xs settings-header-block">
        <p class="eyebrow">Checklist settings</p>
        <h1>Checklist Details on Card Front</h1>
      </header>

      <section class="stack-xs settings-section">
        <div class="compact-auth-row">
          <span id="auth-status-pill" class="pill">Checking access...</span>
          <div class="button-row compact-auth-actions">
            <button id="connect-btn" class="mod-primary" type="button">Connect Trello</button>
            <button id="disconnect-btn" type="button">Disconnect Trello</button>
          </div>
        </div>
        <p class="quiet compact-help-text">To connect Trello, add your API key and allow this site in Trello admin.</p>
      </section>

      <section class="stack-sm settings-section">
        <h2>Board display</h2>
        <div class="button-row settings-status-line">
          <span id="board-permission-pill" class="pill">Checking permissions...</span>
        </div>

        <div class="settings-grid compact-control-grid">
          <label class="checkbox-row" for="board-show-checklist-headers">
            <input id="board-show-checklist-headers" type="checkbox">
            <span>Show section titles</span>
          </label>

          <label class="checkbox-row" for="board-show-finished-content">
            <input id="board-show-finished-content" type="checkbox">
            <span>Show completed tasks</span>
          </label>

          <label class="checkbox-row" for="board-show-progress-bar">
            <input id="board-show-progress-bar" type="checkbox">
            <span>Show progress bar</span>
          </label>

          <label class="stack-xs" for="board-progress-format">
            <span>Progress label</span>
            <select id="board-progress-format">
              <option value="percent">Percent</option>
              <option value="count">Count</option>
            </select>
          </label>

          <label class="stack-xs" for="board-item-order">
            <span>Task order</span>
            <select id="board-item-order">
              <option value="incomplete-first">Open tasks first</option>
              <option value="original">Trello order</option>
            </select>
          </label>
        </div>

        <div class="button-row">
          <button id="save-board-btn" class="mod-primary" type="button">Save board display</button>
        </div>
      </section>

      <section class="stack-sm settings-section">
        <h2>My display</h2>
        <label class="checkbox-row" for="use-private-board-settings">
          <input id="use-private-board-settings" type="checkbox">
          <span>Use my display settings</span>
        </label>

        <div id="private-settings-panel" hidden>
          <div class="settings-grid compact-control-grid">
            <label class="checkbox-row" for="private-show-checklist-headers">
              <input id="private-show-checklist-headers" type="checkbox">
              <span>Show section titles</span>
            </label>

            <label class="checkbox-row" for="private-show-finished-content">
              <input id="private-show-finished-content" type="checkbox">
              <span>Show completed tasks</span>
            </label>

            <label class="checkbox-row" for="private-show-progress-bar">
              <input id="private-show-progress-bar" type="checkbox">
              <span>Show progress bar</span>
            </label>

            <label class="stack-xs" for="private-progress-format">
              <span>Progress label</span>
              <select id="private-progress-format">
                <option value="percent">Percent</option>
                <option value="count">Count</option>
              </select>
            </label>

            <label class="stack-xs" for="private-item-order">
              <span>Task order</span>
              <select id="private-item-order">
                <option value="incomplete-first">Open tasks first</option>
                <option value="original">Trello order</option>
              </select>
            </label>
          </div>

          <div class="button-row settings-private-save-row">
            <button id="save-member-btn" class="mod-primary" type="button">Save my display</button>
          </div>
        </div>
      </section>

      <div class="button-row settings-done-row">
        <button id="close-btn" type="button">Done</button>
      </div>

      <p id="settings-status" class="status-text" aria-live="polite">Loading current preferences...</p>
    </section>
  </main>

  <script src="https://p.trellocdn.com/power-up.min.js"></script>
  <script src="config.js"></script>
  <script src="shared.js"></script>
  <script src="settings.js"></script>
</body>
</html>
