<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings Preview</title>
  <link rel="stylesheet" href="https://p.trellocdn.com/power-up.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="connector-page">
  <main class="standalone-shell">
    <section class="surface standalone-panel stack-md compact-preview-shell settings-flat-shell">
      <header class="stack-xs settings-header-block">
        <p class="eyebrow">Checklist settings</p>
        <h1>Checklist Details on Card Front</h1>
      </header>

      <section class="stack-xs settings-section">
        <div class="compact-auth-row">
          <span class="pill pill-success">Connected</span>
          <div class="button-row compact-auth-actions">
            <button class="mod-primary" type="button">Connect Trello</button>
            <button type="button">Disconnect Trello</button>
          </div>
        </div>
        <p class="quiet compact-help-text">To connect Trello, add your API key and allow this site in Trello admin.</p>
      </section>

      <section class="stack-sm settings-section">
        <h2>Board display</h2>
        <div class="button-row settings-status-line">
          <span class="pill pill-success">Can edit</span>
        </div>

        <div class="compact-control-grid">
          <label class="checkbox-row compact-control" for="preview-board-sections">
            <input id="preview-board-sections" type="checkbox" checked>
            <span>Show section titles</span>
          </label>

          <label class="checkbox-row compact-control" for="preview-board-finished">
            <input id="preview-board-finished" type="checkbox">
            <span>Show completed tasks</span>
          </label>

          <label class="checkbox-row compact-control" for="preview-board-progress-bar">
            <input id="preview-board-progress-bar" type="checkbox" checked>
            <span>Show progress bar</span>
          </label>

          <label class="stack-xs compact-control" for="preview-board-progress-label">
            <span>Progress label</span>
            <select id="preview-board-progress-label">
              <option value="percent" selected>Percent</option>
              <option value="count">Count</option>
            </select>
          </label>

          <label class="stack-xs compact-control" for="preview-board-task-order">
            <span>Task order</span>
            <select id="preview-board-task-order">
              <option value="incomplete-first" selected>Open first</option>
              <option value="original">Trello order</option>
            </select>
          </label>
        </div>

        <div class="button-row">
          <button class="mod-primary" type="button">Save board</button>
        </div>
      </section>

      <section class="stack-sm settings-section">
        <label class="checkbox-row compact-toggle-row" for="preview-private-enabled">
          <input id="preview-private-enabled" type="checkbox" checked>
          <span>Use my display settings</span>
        </label>

        <section class="stack-sm compact-private-panel">
          <h2>My display</h2>

          <div class="compact-control-grid">
            <label class="checkbox-row compact-control" for="preview-private-sections">
              <input id="preview-private-sections" type="checkbox" checked>
              <span>Show section titles</span>
            </label>

            <label class="checkbox-row compact-control" for="preview-private-finished">
              <input id="preview-private-finished" type="checkbox">
              <span>Show completed tasks</span>
            </label>

            <label class="checkbox-row compact-control" for="preview-private-progress-bar">
              <input id="preview-private-progress-bar" type="checkbox" checked>
              <span>Show progress bar</span>
            </label>

            <label class="stack-xs compact-control" for="preview-private-progress-label">
              <span>Progress label</span>
              <select id="preview-private-progress-label">
                <option value="percent" selected>Percent</option>
                <option value="count">Count</option>
              </select>
            </label>

            <label class="stack-xs compact-control" for="preview-private-task-order">
              <span>Task order</span>
              <select id="preview-private-task-order">
                <option value="incomplete-first" selected>Open first</option>
                <option value="original">Trello order</option>
              </select>
            </label>
          </div>

          <div class="button-row compact-footer-row">
            <button class="mod-primary" type="button">Save mine</button>
          </div>
        </section>
      </section>

      <div class="button-row compact-preview-done-row">
        <button type="button">Done</button>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const toggle = document.getElementById("preview-private-enabled");
      const panel = document.querySelector(".compact-private-panel");

      function syncPanel() {
        panel.hidden = !toggle.checked;
      }

      toggle.addEventListener("change", syncPanel);
      syncPanel();
    })();
  </script>
</body>
</html>
